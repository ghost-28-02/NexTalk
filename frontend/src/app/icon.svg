<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="tail" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>

  <!-- Chat bubble body -->
  <rect x="4" y="4" width="52" height="42" rx="14" fill="url(#bg)"/>

  <!-- Tail of chat bubble -->
  <path d="M14 46 L8 58 L28 50 Z" fill="url(#tail)"/>

  <!-- Letter N -->
  <text
    x="32"
    y="34"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="26"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1"
  >N</text>
</svg>
